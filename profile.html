<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body>
    <div class="app-shell">
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <span class="page-title">Meu Perfil</span>
            <button class="page-action-btn" id="editToggleBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                Editar
            </button>
        </header>

        <div class="page-content">
            <!-- View mode -->
            <div id="viewMode">
                <div class="card profile-card">
                    <div class="avatar-circle" id="avatarCircle">-</div>
                    <div class="profile-name" id="profileName">Carregando...</div>
                    <div class="profile-email" id="profileEmail">...</div>
                    <div class="profile-badges">
                        <span class="profile-badge" id="profileLevel">Nível 1</span>
                        <span class="profile-badge-sep">•</span>
                        <span class="profile-badge" id="profileMedalhas">0 medalhas</span>
                    </div>
                </div>

                <div class="card stats-card">
                    <div class="stats-card-title">
                        <span>🏆</span> Estatísticas
                    </div>
                    <div class="stats-grid-2">
                        <div class="stat-cell">
                            <div class="stat-cell-icon-val">
                                <span class="stat-cell-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <circle cx="12" cy="12" r="10" fill="#F5A623" stroke="#E07B00"
                                            stroke-width="2" />
                                        <path
                                            d="M12 7V17M9 10H13.5C14.3284 10 15 10.6716 15 11.5C15 12.3284 14.3284 13 13.5 13H10.5C9.67157 13 9 13.6716 9 14.5C9 15.3284 9.67157 16 10.5 16H15"
                                            stroke="white" stroke-width="2" stroke-linecap="round" />
                                    </svg>
                                </span>
                                <span class="stat-cell-val orange" id="statMoedas">--</span>
                            </div>
                            <span class="stat-cell-label">Moedas</span>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-cell-icon-val">
                                <span class="stat-cell-icon">🔥</span>
                                <span class="stat-cell-val red" id="statDias">--</span>
                            </div>
                            <span class="stat-cell-label">Dias seguidos</span>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-cell-icon-val">
                                <span class="stat-cell-icon">⭐</span>
                                <span class="stat-cell-val" id="statXP">--</span>
                            </div>
                            <span class="stat-cell-label">XP Total</span>
                        </div>
                        <div class="stat-cell">
                            <div class="stat-cell-icon-val">
                                <span class="stat-cell-icon">🎯</span>
                                <span class="stat-cell-val green" id="statPrecisao">0%</span>
                            </div>
                            <span class="stat-cell-label">Precisão</span>
                        </div>
                    </div>
                    <div class="profile-member-since">
                        📅 Membro desde <span id="memberSince">--</span>
                    </div>
                </div>
            </div>

            <!-- Edit mode -->
            <div id="editMode" style="display:none;">
                <div class="card">
                    <div class="edit-form">
                        <div style="text-align:center;padding:12px 0 4px;">
                            <div class="avatar-circle" id="editAvatarCircle" style="margin:0 auto;">C</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nome completo</label>
                            <input class="form-input" type="text" id="editName" placeholder="Seu nome">
                        </div>
                        <div class="form-group">
                            <label class="form-label">E-mail</label>
                            <input class="form-input" type="email" id="editEmail" placeholder="Seu e-mail">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Nova senha (deixe vazio para manter)</label>
                            <input class="form-input" type="password" id="editPassword" placeholder="••••••••">
                        </div>
                        <button class="save-btn" id="saveProfileBtn">Salvar alterações</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/database_json.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
