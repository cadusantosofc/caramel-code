<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div class="app-shell">
    <header class="page-header">
        <button class="back-btn" onclick="history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <span class="page-title">Meu Perfil</span>
        <button class="page-action-btn" id="editToggleBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Editar
        </button>
    </header>

    <div class="page-content">
        <!-- View mode -->
        <div id="viewMode">
            <div class="card profile-card">
                <div class="avatar-circle" id="avatarCircle">C</div>
                <div class="profile-name" id="profileName">Carlos Eduardo</div>
                <div class="profile-email" id="profileEmail">email@email.com</div>
                <div class="profile-badges">
                    <span class="profile-badge" id="profileLevel">Nível 1</span>
                    <span class="profile-badge-sep">•</span>
                    <span class="profile-badge" id="profileMedalhas">0 medalhas</span>
                </div>
            </div>

            <div class="card stats-card">
                <div class="stats-card-title">
                    <span>🏆</span> Estatísticas
                </div>
                <div class="stats-grid-2">
                    <div class="stat-cell">
                        <div class="stat-cell-icon-val">
                            <span class="stat-cell-icon">🪙</span>
                            <span class="stat-cell-val orange" id="statMoedas">50</span>
                        </div>
                        <span class="stat-cell-label">Moedas</span>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-icon-val">
                            <span class="stat-cell-icon">🔥</span>
                            <span class="stat-cell-val red" id="statDias">1</span>
                        </div>
                        <span class="stat-cell-label">Dias seguidos</span>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-icon-val">
                            <span class="stat-cell-icon">⭐</span>
                            <span class="stat-cell-val" id="statXP">0</span>
                        </div>
                        <span class="stat-cell-label">XP Total</span>
                    </div>
                    <div class="stat-cell">
                        <div class="stat-cell-icon-val">
                            <span class="stat-cell-icon">🎯</span>
                            <span class="stat-cell-val green" id="statPrecisao">0%</span>
                        </div>
                        <span class="stat-cell-label">Precisão</span>
                    </div>
                </div>
                <div class="profile-member-since">
                    📅 Membro desde <span id="memberSince">--</span>
                </div>
            </div>
        </div>

        <!-- Edit mode -->
        <div id="editMode" style="display:none;">
            <div class="card">
                <div class="edit-form">
                    <div style="text-align:center;padding:12px 0 4px;">
                        <div class="avatar-circle" id="editAvatarCircle" style="margin:0 auto;">C</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nome completo</label>
                        <input class="form-input" type="text" id="editName" placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input class="form-input" type="email" id="editEmail" placeholder="Seu e-mail">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Nova senha (deixe vazio para manter)</label>
                        <input class="form-input" type="password" id="editPassword" placeholder="••••••••">
                    </div>
                    <button class="save-btn" id="saveProfileBtn">Salvar alterações</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/database_json.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
