<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            background: var(--body-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-primary);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            padding-bottom: 90px;
        }

        /* HEADER */
        .course-header {
            padding: 24px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-nav {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: var(--border);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        .course-info h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }

        .course-info p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.4;
        }

        /* PROGRESS CARD */
        .progress-card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-percent {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            border: 1px solid var(--border);
        }

        .progress-bar-bg {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 16px; font-weight: 700; color: var(--text-primary); }
        .stat-lab { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-top: 4px;}

        /* LISTA DE MÓDULOS */
        .modules-list {
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .module-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .module-item:hover { 
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 4px 12px var(--shadow);
        }
        
        .module-item:active { transform: translateY(0); }

        .module-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .module-info { flex: 1; }
        .module-title { font-weight: 600; color: var(--text-primary); font-size: 15px; margin-bottom: 4px; }
        .module-meta { font-size: 12px; color: var(--text-secondary); font-weight: 500;}

        .module-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: transparent;
            transition: all 0.2s;
        }

        .module-item.completed .module-check {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .module-item.locked {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(1);
        }
        
        .module-item.locked:hover {
            transform: none;
            border-color: var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* BOTTOM NAV */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 70px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            gap: 4px;
            transition: color 0.2s;
        }

        .tab-item:hover {
            color: var(--text-primary);
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <header class="course-header">
            <div class="header-nav">
                <a href="javascript:history.back()" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </a>
                <div class="course-info">
                    <h1 id="courseTitle">Carregando...</h1>
                    <p id="courseDesc">Buscando conteúdo...</p>
                </div>
            </div>

            <div class="progress-card">
                <div class="progress-header">
                    <div class="progress-label">🎯 Progresso da Trilha</div>
                    <div class="progress-percent" id="progressPercent">0%</div>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-val" id="statFases">0</span>
                        <span class="stat-lab">Fases</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="statMoedas">0</span>
                        <span class="stat-lab">Moedas</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="statNivel">0</span>
                        <span class="stat-lab">Nível</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="modules-list" id="modulesList">
                <!-- Injetado via API -->
            </div>
        </div>

        <nav class="tab-bar">
            <a href="dashboard.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
                <span>Início</span>
            </a>
            <a href="trails.html" class="tab-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>
                <span>Trilhas</span>
            </a>
            <a href="profile.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4-4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadCourseContent() {
            const params = new URLSearchParams(window.location.search);
            const trailId = params.get('trail') || 'html';

            try {
                const response = await fetch(`api/get_course_content.php?trail=${trailId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('courseTitle').textContent = data.curso.titulo;
                    document.getElementById('courseDesc').textContent = data.curso.descricao;
                    
                    document.getElementById('statFases').textContent = data.modulos.length;
                    document.getElementById('statMoedas').textContent = data.stats.moedas;
                    document.getElementById('statNivel').textContent = data.stats.nivel;

                    const percent = Math.round((data.concluidas.length / data.modulos.length) * 100) || 0;
                    document.getElementById('progressPercent').textContent = percent + '%';
                    document.getElementById('progressBar').style.width = percent + '%';

                    const list = document.getElementById('modulesList');
                    list.innerHTML = '';

                    data.modulos.forEach(mod => {
                        const isCompleted = data.concluidas.includes(parseInt(mod.ordem));
                        const isLocked = parseInt(mod.ordem) > (data.concluidas.length + 1);

                        const item = document.createElement('div');
                        item.className = `module-item ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
                        
                        item.onclick = () => {
                            if (!isLocked) location.href = `study.html?trail=${trailId}&phase=${mod.ordem}`;
                            else alert("Conclua a fase anterior para liberar esta!");
                        };

                        item.innerHTML = `
                            <div class="module-icon">📚</div>
                            <div class="module-info">
                                <div class="module-title">Módulo ${mod.ordem}: ${mod.titulo}</div>
                                <div class="module-meta">10 questões • 25 moedas</div>
                            </div>
                            <div class="module-check">
                                ${isCompleted ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
                            </div>
                        `;
                        list.appendChild(item);
                    });
                }
            } catch (e) {
                console.error("Erro ao carregar curso:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(window.applyTheme) window.applyTheme();
            loadCourseContent();
        });
    </script>
</body>

</html>
