<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        body {
            background-color: #f8fafc;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* HEADER CARAMEL */
        .course-header {
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, #f5a623 0%, #ea580c 100%);
            color: white;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            margin-bottom: 24px;
        }

        .header-nav {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .course-info h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 4px 0;
        }

        .course-info p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            line-height: 1.4;
        }

        /* PROGRESS CARD */
        .progress-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            margin-top: 10px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .progress-label {
            font-weight: 700;
            color: #1e293b;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-percent {
            background: #fff7ed;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            color: #f5a623;
        }

        .progress-bar-bg {
            height: 8px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5a623, #f97316);
            width: 0%;
            transition: width 0.5s ease;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: 800; color: #1e293b; }
        .stat-lab { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

        /* LISTA DE MÓDULOS */
        .modules-list {
            padding: 0 20px 120px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .module-item {
            background: #ffffff;
            border: 1.5px solid #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .module-item:active { transform: scale(0.98); }

        .module-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #fff7ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: 1px solid #fed7aa;
        }

        .module-info { flex: 1; }
        .module-title { font-weight: 700; color: #1e293b; font-size: 15px; margin-bottom: 2px; }
        .module-meta { font-size: 12px; color: #64748b; }

        .module-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .module-item.completed .module-check {
            background: #22c55e;
            border-color: #22c55e;
            color: white;
            font-size: 12px;
        }

        .module-item.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* TAB BAR CARAMEL */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            height: 70px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
        }

        .tab-item.active { color: #f5a623; }
        .tab-item svg { width: 24px !important; height: 24px !important; margin-bottom: 4px; }
    </style>
</head>

<body>
    <div class="app-shell">
        <header class="course-header">
            <div class="header-nav">
                <button class="back-btn" onclick="location.href='trails.html'">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="3">
                        <path d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="course-info">
                    <h1 id="courseTitle">Carregando...</h1>
                    <p id="courseDesc">Buscando conteúdo real do banco de dados...</p>
                </div>
            </div>

            <div class="progress-card">
                <div class="progress-header">
                    <div class="progress-label">🎯 Progresso da Trilha</div>
                    <div class="progress-percent" id="progressPercent">0%</div>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <span class="stat-val" id="statFases">0</span>
                        <span class="stat-lab">Fases</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="statMoedas">0</span>
                        <span class="stat-lab">Moedas</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-val" id="statNivel">0</span>
                        <span class="stat-lab">Nível</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="modules-list" id="modulesList">
                <!-- Injetado via API -->
            </div>
        </div>

        <nav class="tab-bar">
            <a href="dashboard.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                </svg>
                <span>Início</span>
            </a>
            <a href="trails.html" class="tab-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                </svg>
                <span>Trilhas</span>
            </a>
            <a href="profile.html" class="tab-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4-4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadCourseContent() {
            const params = new URLSearchParams(window.location.search);
            const trailId = params.get('trail') || 'html';

            try {
                const response = await fetch(`api/get_course_content.php?trail=${trailId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('courseTitle').textContent = data.curso.titulo;
                    document.getElementById('courseDesc').textContent = data.curso.descricao;
                    
                    document.getElementById('statFases').textContent = data.modulos.length;
                    document.getElementById('statMoedas').textContent = data.stats.moedas;
                    document.getElementById('statNivel').textContent = data.stats.nivel;

                    const percent = Math.round((data.concluidas.length / data.modulos.length) * 100) || 0;
                    document.getElementById('progressPercent').textContent = percent + '%';
                    document.getElementById('progressBar').style.width = percent + '%';

                    const list = document.getElementById('modulesList');
                    list.innerHTML = '';

                    data.modulos.forEach(mod => {
                        const isCompleted = data.concluidas.includes(parseInt(mod.ordem));
                        const isLocked = parseInt(mod.ordem) > (data.concluidas.length + 1);

                        const item = document.createElement('div');
                        item.className = `module-item ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
                        
                        item.onclick = () => {
                            if (!isLocked) location.href = `study.html?trail=${trailId}&phase=${mod.ordem}`;
                            else alert("Conclua a fase anterior para liberar esta!");
                        };

                        item.innerHTML = `
                            <div class="module-icon">📚</div>
                            <div class="module-info">
                                <div class="module-title">Módulo ${mod.ordem}: ${mod.titulo}</div>
                                <div class="module-meta">10 questões • 25 moedas</div>
                            </div>
                            <div class="module-check">${isCompleted ? '✓' : ''}</div>
                        `;
                        list.appendChild(item);
                    });
                }
            } catch (e) {
                console.error("Erro ao carregar curso:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.applyTheme();
            loadCourseContent();
        });
    </script>
</body>

</html>
