<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .setup-card {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .setup-icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="setup-card">
            <div class="setup-icon">🛠️</div>
            <div class="status-badge">PRIMEIRA INSTALAÇÃO</div>
            <h2 class="login-title">Configurador Caramel</h2>
            <p class="subtitle">Vamos preparar seu banco de dados MySQL e criar o usuário administrador automaticamente.</p>
            
            <form action="migrate.php" method="POST" class="login-form">
                <div class="form-group">
                    <label for="key">Chave de Segurança (.env)</label>
                    <input type="password" id="key" name="key" placeholder="Digite a MIGRATE_KEY" required>
                </div>
                
                <button type="submit" class="login-btn register-btn">Iniciar Migração →</button>
            </form>
            
            <p style="font-size: 12px; color: #888; margin-top: 20px;">
                Isso irá criar as tabelas e o usuário <strong>cadusantos.paiva@gmail.com</strong>
            </p>
        </div>
    </div>
</body>
</html>
