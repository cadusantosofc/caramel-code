<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="back-arrow">
                <a href="index.html" class="arrow-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
            </div>

            <div class="logo-section">
                <img src="img/logo.png" alt="Caramelo" class="logo">
            </div>

            <h2 class="login-title">Junte-se ao Caramelo</h2>
            <p class="subtitle">Crie sua conta e comece a programar</p>

            <form class="login-form">
                <div class="form-group">
                    <label for="name">Nome</label>
                    <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Seu melhor e-mail" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
                </div>

                <button type="submit" class="login-btn register-btn">Criar conta</button>
            </form>

            <div class="signup-link">
                <p>Já tem conta? <a href="login.html">Fazer login</a></p>
            </div>

            <div class="tip-section">
                <div class="tip-icon">💡</div>
                <p class="tip-text">Dica: O Caramelo vai te ajudar em cada passo da jornada!</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/database_json.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
