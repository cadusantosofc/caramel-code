<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trilhas - Caramel Code</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div class="app-shell">
    <header class="page-header">
        <button class="back-btn" onclick="location.href='dashboard.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <div>
            <div class="page-title">Trilhas de Aprendizado</div>
            <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">Escolha sua jornada de programação</div>
        </div>
        <div style="width:60px;"></div>
    </header>

    <div class="page-content" id="trailsContent">
        <div class="trail-level-banner">
            <span class="trail-level-emoji" id="bannerEmoji">🌱</span>
            <div class="trail-level-info">
                <div class="trail-level-name" id="bannerLevel">Nível 1</div>
                <div class="trail-level-sub" id="bannerXP">0 XP • 50 moedas</div>
            </div>
            <span class="trail-level-badge" id="bannerBadge">Iniciante</span>
        </div>

        <div id="trailsList"></div>

        <div class="trail-tip">
            <span class="trail-tip-icon">🐕</span>
            <div class="trail-tip-text">Cada trilha foi pensada para te levar do básico ao avançado. Vá no seu ritmo e divirta-se programando!</div>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script src="js/database_json.js"></script>
<script src="js/trails.js"></script>
</body>
</html>
